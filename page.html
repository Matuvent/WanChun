<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>如我所书 · 万椿生日快乐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #080c14;
  font-family: 'Noto Serif SC', 'SimSun', serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== STARFIELD ===== */
#starfield {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ===== PARTICLES ===== */
#particles {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}
.float-particle {
  position: absolute;
  animation: floatUp linear infinite;
  opacity: 0;
}
@keyframes floatUp {
  0%   { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
  10%  { opacity: 0.85; }
  80%  { opacity: 0.5; }
  100% { transform: translateY(-110vh) translateX(40px) scale(1.2); opacity: 0; }
}

/* ===== COVER SCREEN ===== */
#cover-screen {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #080c14;
  cursor: pointer;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#cover-screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(1.08);
}
#cover-screen img {
  max-width: 92vw;
  max-height: 88vh;
  object-fit: contain;
  filter: drop-shadow(0 0 40px rgba(200,160,80,0.35));
  animation: coverFloat 3s ease-in-out infinite;
}
@keyframes coverFloat {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-8px); }
}
.cover-hint {
  position: absolute;
  bottom: 10vh;
  color: rgba(200,160,100,0.6);
  font-size: 14px;
  letter-spacing: 4px;
  animation: hintPulse 2s ease-in-out infinite;
}
@keyframes hintPulse {
  0%,100% { opacity: 0.4; }
  50%     { opacity: 1; }
}

/* ===== BOOK VIEW ===== */
#book-view {
  position: relative;
  z-index: 10;
  width: 92vw;
  max-width: 960px;
  aspect-ratio: 1919 / 1199;
  opacity: 0;
  transform: scale(0.92);
  transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
}
#book-view.visible {
  opacity: 1;
  transform: scale(1);
}
#book-view.fading {
  opacity: 0;
  transform: scale(0.96);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.book-spread {
  position: relative;
  width: 100%; height: 100%;
  animation: bookSway 5s ease-in-out infinite;
}
.book-spread > img.book-bg {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}
@keyframes bookSway {
  0%,100% { transform: translateY(0) rotate(0deg); }
  20%    { transform: translateY(-10px) rotate(0.5deg); }
  50%    { transform: translateY(5px) rotate(-0.3deg); }
  80%    { transform: translateY(-5px) rotate(0.2deg); }
}

/* ===== LEFT PAGE — 黄金裔 image ===== */
.left-page {
  position: absolute;
  /* These percentages map to the visible page area within the book image */
  left: 7.5%;
  top: 13%;
  width: 36%;
  height: 72%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 4px;
}
.left-page img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 2px;
  animation: imgCounterSway 5s ease-in-out infinite;
}
.left-page .family-img {
  max-width: 100%;
  max-height: 100%;
}
.left-page .dual-img {
  display: flex;
  gap: 0;
  width: 100%;
  height: 100%;
  animation: imgCounterSway 5s ease-in-out infinite;
}
@keyframes imgCounterSway {
  0%,100% { transform: translateY(0); }
  20%    { transform: translateY(12px); }
  50%    { transform: translateY(-7px); }
  80%    { transform: translateY(5px); }
}
.left-page .dual-img img {
  width: 50%;
  height: 100%;
  object-fit: contain;
}

/* ===== RIGHT PAGE — blessing text ===== */
.right-page {
  position: absolute;
  right: 20%;
  top: 13%;
  width: 24%;
  height: 72%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.blessing-text {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(18px, 2.5vw, 34px);
  color: #4a3520;
  text-align: center;
  line-height: 1.9;
  letter-spacing: 2px;
  padding: 20px;
}

/* ===== SPECIAL SPREAD: 昔涟 + 全家福 ===== */
.photo-spread .left-page img,
.photo-spread .right-page img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* ===== FINALE — centered text across both pages ===== */
.finale-overlay {
  position: absolute;
  top: 13%;
  left: 7.5%;
  width: 85%;
  height: 72%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.finale-text {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(26px, 4vw, 52px);
  color: #6b3a1f;
  text-align: center;
  line-height: 1.7;
  letter-spacing: 3px;
  animation: finaleGlow 2.5s ease-in-out infinite;
}
@keyframes finaleGlow {
  0%,100% { text-shadow: 0 0 0 rgba(180,120,60,0); }
  50%     { text-shadow: 0 0 30px rgba(180,120,60,0.5), 0 0 60px rgba(220,160,80,0.25); }
}

/* ===== NAVIGATION ===== */
#nav-bar {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 18px;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.5s ease 0.6s;
}
#nav-bar.visible { opacity: 1; }
.nav-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1.5px solid rgba(200,160,100,0.5);
  background: rgba(8,12,20,0.8);
  color: rgba(220,190,130,0.85);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.nav-btn:hover:not(:disabled) {
  background: rgba(200,150,60,0.2);
  border-color: rgba(240,200,130,0.8);
  color: #f0d68a;
  box-shadow: 0 0 22px rgba(200,150,60,0.3);
}
.nav-btn:active:not(:disabled) { transform: scale(0.9); }
.nav-btn:disabled { opacity: 0.15; cursor: default; }
.nav-info {
  color: rgba(200,160,100,0.55);
  font-size: 12px;
  letter-spacing: 3px;
  min-width: 60px;
  text-align: center;
}

/* ===== CONFETTI ===== */
#confetti-layer {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 200;
  display: none;
}
#confetti-layer.active { display: block; }
.confetti-bit {
  position: absolute;
  animation: confettiDrop linear forwards;
}
@keyframes confettiDrop {
  0%   { transform: translateY(-100px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(900deg); opacity: 0; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  #book-view { width: 98vw; }
  .left-page { left: 7%; top: 14%; width: 36%; height: 70%; }
  .right-page { right: 15%; top: 14%; width: 36%; height: 70%; }
  .finale-overlay { left: 7%; top: 14%; width: 86%; height: 70%; }
  .nav-btn { width: 38px; height: 38px; font-size: 16px; }
  .cover-hint { bottom: 6vh; font-size: 12px; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="particles"></div>

<!-- COVER -->
<div id="cover-screen" onclick="enterBook()">
  <img src="如我所书封面.png" alt="如我所书" draggable="false">
  <span class="cover-hint">— 点 击 翻 开 —</span>
</div>

<!-- BOOK -->
<div id="book-view">
  <div class="book-spread" id="spread-content"></div>
</div>

<!-- NAV -->
<div id="nav-bar">
  <button class="nav-btn" id="prevBtn" onclick="gotoSpread(-1)">◂</button>
  <span class="nav-info" id="navInfo">1 / 16</span>
  <button class="nav-btn" id="nextBtn" onclick="gotoSpread(1)">▸</button>
</div>

<div id="confetti-layer"></div>
<audio id="bgm" src="如我所书音乐.mp3" loop autoplay preload="auto"></audio>
<audio id="birthdaySong" src="生日快乐歌.mp3" preload="auto"></audio>

<script>
// ============================================================
//  如我所书 · 万椿 17岁生日
// ============================================================

// The "黄金裔" — Chrysos Heirs blessings
const spreads = [
  { type:'heir', img:'黄金裔/浪漫.jpg', text:'愿浪漫连接你与未来的恋人' },
  { type:'heir', img:'黄金裔/门径.jpg', text:'愿门径在你的前方不断延伸' },
  { type:'heir', img:'黄金裔/纷争.jpg', text:'愿胜利永远在你的生活飘扬' },
  { type:'heir', img:'黄金裔/死亡.jpg', text:'愿生死呵护你健康' },
  { type:'heir', img:'黄金裔/理性.jpg', text:'愿理性带给你智慧' },
  { type:'heir', img:'黄金裔/天空.jpg', text:'愿天空给你展现虹光' },
  { type:'heir', img:'黄金裔/诡计.jpg', text:'愿诡计与你游戏快乐' },
  { type:'heir', img:'黄金裔/负世.jpg', text:'愿负世承载你的未来' },
  { type:'heir', img:'黄金裔/海洋.jpg', text:'愿海洋为了你而欢宴' },
  { type:'heir', img:'黄金裔/律法.jpg', text:'愿律法予你公平' },
  { type:'heir', img:'黄金裔/岁月.jpg', text:'愿岁月伴你成长' },
  { type:'heir', img:'黄金裔/大地.jpg', text:'愿大地护你前方' },
  { type:'heir', img:['黄金裔/开拓 星.jpg','黄金裔/开拓 穹.jpg'], text:'愿开拓，带你前往新的方向' },
  { type:'heir', img:'黄金裔/无暇.jpg', text:'而无暇的水晶花，将你用爱铭记' },
  { type:'finale', img:'全家福.png', text:'万椿，17岁生日快乐！'}
];

let current = 0;
let bookOpen = false;

// ===== STARFIELD =====
(function(){
  const c = document.getElementById('starfield');
  const ctx = c.getContext('2d');
  function R(){ c.width=window.innerWidth; c.height=window.innerHeight; }
  R(); window.addEventListener('resize',R);
  const stars = Array.from({length:200},()=>({
    x:Math.random()*c.width, y:Math.random()*c.height,
    r:Math.random()*1.5+0.3, a:Math.random(),
    sp:Math.random()*0.008+0.003, ph:Math.random()*Math.PI*2
  }));
  (function draw(t){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a=0.3+0.7*Math.sin(t*s.sp+s.ph);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,180,140,${s.a*0.7})`; ctx.fill();
      if(s.r>1&&s.a>0.7){
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);
        ctx.fillStyle=`rgba(200,180,140,${s.a*0.08})`; ctx.fill();
      }
    });
    requestAnimationFrame(draw);
  })();
})();

// ===== PARTICLES =====
(function(){
  const p = document.getElementById('particles');
  function spawn(){
    const e=document.createElement('div'); e.className='float-particle';
    const s=Math.random()*4+2;
    e.style.left=Math.random()*100+'%';
    e.style.bottom=-(Math.random()*30)+'px';
    e.style.width=s+'px'; e.style.height=s+'px';
    e.style.background=Math.random()>0.5?'rgba(240,210,140,0.85)':'rgba(200,180,140,0.65)';
    e.style.borderRadius=Math.random()>0.6?'50%':'1px';
    e.style.animationDuration=(Math.random()*10+10)+'s';
    p.appendChild(e); setTimeout(()=>e.remove(),20000);
  }
  setInterval(spawn,400);
  for(let i=0;i<15;i++) setTimeout(spawn,i*300);
})();

// ===== RENDER SPREAD =====
function renderSpread() {
  const container = document.getElementById('spread-content');
  const data = spreads[current];
  let html = `<img class="book-bg" src="如我所书书页.png" alt="" draggable="false">`;

  if (data.type === 'heir') {
    // Left: 黄金裔 image(s)
    html += '<div class="left-page">';
    if (Array.isArray(data.img)) {
      html += '<div class="dual-img">';
      data.img.forEach(src => { html += `<img src="${src}" alt="" draggable="false">`; });
      html += '</div>';
    } else {
      const cls = data.family ? ' family-img' : '';
      html += `<img class="${cls}" src="${data.img}" alt="" draggable="false">`;
    }
    html += '</div>';
    // Right: blessing
    html += `<div class="right-page"><span class="blessing-text">${data.text}</span></div>`;
  }

  else if (data.type === 'finale') {
    if (data.img) {
      html += `<div class="left-page"><img class="family-img" src="${data.img}" alt="" draggable="false"></div>`;
      html += `<div class="right-page"><span class="blessing-text">${data.text}</span></div>`;
    } else {
      html += `<div class="finale-overlay"><span class="finale-text">${data.text}</span></div>`;
    }
  }

  container.innerHTML = html;
  updateNav();

  // Confetti + music switch on finale
  const cl = document.getElementById('confetti-layer');
  const bgm = document.getElementById('bgm');
  const bSong = document.getElementById('birthdaySong');
  if (data.type === 'finale') {
    cl.classList.add('active');
    cl.innerHTML = '';
    spawnConfetti();
    if (bgm) { bgm.pause(); bgm.currentTime = 0; }
    if (bSong) bSong.play().catch(() => {});
  } else {
    cl.classList.remove('active');
    cl.innerHTML = '';
    if (bSong) { bSong.pause(); bSong.currentTime = 0; }
    if (bgm && bgm.paused) bgm.play().catch(() => {});
  }
}

function updateNav() {
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === spreads.length - 1;
  document.getElementById('navInfo').textContent = `${current+1} / ${spreads.length}`;
}

// ===== NAVIGATION =====
function gotoSpread(dir) {
  const next = current + dir;
  if (next < 0 || next >= spreads.length) return;

  // Quick fade transition
  const bv = document.getElementById('book-view');
  bv.classList.add('fading');
  setTimeout(() => {
    current = next;
    renderSpread();
    bv.classList.remove('fading');
  }, 250);
}

// ===== ENTER BOOK =====
function enterBook() {
  if (bookOpen) return;
  bookOpen = true;

  const bgm = document.getElementById('bgm');
  if (bgm) bgm.play().catch(() => {});

  const cover = document.getElementById('cover-screen');
  const book = document.getElementById('book-view');
  const nav = document.getElementById('nav-bar');

  cover.classList.add('hidden');
  book.classList.add('visible');
  nav.classList.add('visible');
  renderSpread();
}

// ===== CONFETTI =====
function spawnConfetti() {
  const c = document.getElementById('confetti-layer');
  const colors = [
    '#f0d68a','#d4a855','#c8963e','#e8c877','#ffd700',
    '#5bbfba','#7ec8a6','#e8a0bf','#d4a0b8',
    '#faf0d7','#fff8dc','#ffe4b5'
  ];
  for (let i=0;i<160;i++) {
    const el=document.createElement('div'); el.className='confetti-bit';
    el.style.left=Math.random()*100+'%';
    el.style.top=-(Math.random()*50)+'px';
    const s=Math.random()*8+4;
    el.style.width=s+'px'; el.style.height=(Math.random()*6+3)+'px';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    el.style.animationDuration=(Math.random()*4+3)+'s';
    el.style.animationDelay=Math.random()*2.5+'s';
    c.appendChild(el);
  }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (!bookOpen) { if (e.key==='Enter'||e.key===' ') enterBook(); return; }
  if (e.key==='ArrowLeft') gotoSpread(-1);
  if (e.key==='ArrowRight') gotoSpread(1);
});

// ===== TOUCH SWIPE =====
let tx=0;
document.addEventListener('touchstart', e => { tx=e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx;
  if (Math.abs(dx)>60) {
    if (!bookOpen) { if (dx<0) enterBook(); return; }
    gotoSpread(dx>0?-1:1);
  }
});

// ===== MOUSE WHEEL =====
document.addEventListener('wheel', e => {
  if (!bookOpen) return;
  e.preventDefault();
  if (e.deltaX>20||e.deltaY>20) gotoSpread(1);
  if (e.deltaX<-20||e.deltaY<-20) gotoSpread(-1);
}, {passive:false});

// ===== AUTOPLAY BGM =====
(function(){
  const bgm = document.getElementById('bgm');
  if (!bgm) return;
  // Try immediate autoplay
  bgm.play().catch(() => {
    // If blocked, retry on first user interaction
    const retry = () => { bgm.play().catch(() => {}); document.removeEventListener('click',retry); document.removeEventListener('touchstart',retry); };
    document.addEventListener('click', retry);
    document.addEventListener('touchstart', retry);
  });
})();
</script>

</body>
</html>
